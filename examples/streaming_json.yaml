case_id: streaming_json_001

backend:
  provider: mock

protocol:
  type: chat_completions

model: mock-model

features:
  streaming: true
  tool_calling: false
  structured_output: true

messages:
  - role: user
    content: "Return a small JSON object with status and answer."

expected:
  contains_text: '"status"'
  json_schema_valid: true
  json_schema:
    type: object
    properties:
      status:
        type: string
      answer:
        type: string
    required:
      - status
      - answer
    additionalProperties: false

metadata:
  purpose: "Validate that the mock backend can return OpenAI-compatible streaming chunks."
  mock_stream_chunks:
    - '{"status"'
    - ': "ok"'
    - ', "answer"'
    - ': "Agent Eval Lab streaming mock"'
    - '}'